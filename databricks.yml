bundle:
  name: otel-simulator

targets:
  dev:
    mode: development
    workspace:
      profile: aws-west
      host: https://e2-demo-field-eng.cloud.databricks.com
    resources:
      apps:
        otel-simulator:
          name: otel-simulator
          description: "EO Telemetry Simulator — Data Center Edition"
          source_code_path: app_otel_sim
          config:
            command:
              - uvicorn
              - backend.server:app
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              - name: DATABRICKS_HOST
                value: https://e2-demo-field-eng.cloud.databricks.com
              - name: DATABRICKS_CATALOG
                value: bx3
              - name: DATABRICKS_SCHEMA
                value: otel_demo
              - name: OTEL_SERVICE_NAME
                value: otel-simulator
              - name: OTEL_SPANS_TABLE
                value: bx3.otel_demo.otel_spans_v2
              - name: OTEL_LOGS_TABLE
                value: bx3.otel_demo.otel_logs_v2
              - name: OTEL_METRICS_TABLE
                value: bx3.otel_demo.otel_metrics
              - name: DATABRICKS_WAREHOUSE_ID
                value: "67bbe3acc184b4aa"
              - name: GENIE_SPACE_ID
                value: "01f11cbdc1b21b06b17d10fa4f58a5f1"
          permissions:
            - user_name: robert.leach@databricks.com
              level: CAN_MANAGE

        otel-operational-app:
          name: otel-operational-app
          description: "EO Operational Dashboard — Real-Time Telemetry Monitor"
          source_code_path: app_otel_ops
          config:
            command:
              - uvicorn
              - backend.server:app
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              - name: DATABRICKS_HOST
                value: https://e2-demo-field-eng.cloud.databricks.com
              - name: OTEL_SPANS_TABLE
                value: bx3.otel_demo.otel_spans_v2
              - name: OTEL_LOGS_TABLE
                value: bx3.otel_demo.otel_logs_v2
              - name: OTEL_METRICS_TABLE
                value: bx3.otel_demo.otel_metrics
              - name: DATABRICKS_WAREHOUSE_ID
                value: "67bbe3acc184b4aa"
          permissions:
            - user_name: robert.leach@databricks.com
              level: CAN_MANAGE
